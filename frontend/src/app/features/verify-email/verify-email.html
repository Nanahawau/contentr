<div class="min-h-screen bg-stone-50 flex items-center justify-center p-6">
  <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-10 w-full max-w-sm text-center">

    @if (state() === 'verifying') {
      <div class="w-12 h-12 rounded-full border-2 border-stone-200 border-t-stone-900 animate-spin mx-auto mb-5"></div>
      <h2 class="text-stone-900 font-semibold text-lg mb-1">Verifying your email</h2>
      <p class="text-stone-500 text-sm">Just a moment...</p>
    }

    @if (state() === 'success') {
      <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h2 class="text-stone-900 font-semibold text-lg mb-1">Email verified</h2>
      <p class="text-stone-500 text-sm">Redirecting you to login...</p>
    }

    @if (state() === 'error') {
      <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </div>
      <h2 class="text-stone-900 font-semibold text-lg mb-1">Link invalid or expired</h2>
      <p class="text-stone-500 text-sm mb-6">This verification link has expired or already been used.</p>
      <a routerLink="/login" class="text-sm font-medium text-stone-900 underline underline-offset-2">
        Back to login
      </a>
    }

  </div>
</div>
