<header class="h-12 border-b border-stone-200 bg-white flex items-center justify-between px-6">
  <!-- Search -->
  <div class="flex items-center gap-2 bg-stone-100 rounded-md px-3 py-1.5 w-72">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input
      type="text"
      placeholder="Search uploads, content..."
      class="bg-transparent text-sm text-stone-600 placeholder-stone-400 outline-none w-full"
    />
  </div>

  <!-- Right actions -->
  <div class="flex items-center gap-3">
    @if (authService.currentUser(); as currentUser) {
      <div class="flex items-center gap-1.5 bg-amber-50 border border-amber-200 rounded-full px-3 py-1">
        <div class="w-1.5 h-1.5 rounded-full bg-amber-500"></div>
        <span class="text-xs font-semibold text-amber-900">{{ currentUser.credits.balance }} credits</span>
      </div>

      @if (currentUser.credits.balance < 100) {
        <button class="text-xs font-medium text-white bg-stone-900 px-3 py-1.5 rounded-md hover:bg-stone-700 transition-colors">
          Buy credits
        </button>
      }
    }
  </div>
</header>
